<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- White background -->
  <rect width="32" height="32" fill="white"/>
  
  <!-- Top right blue rounded rectangle -->
  <rect x="17" y="7" width="13" height="6" rx="3" fill="#4B9FFF"/>
  
  <!-- Top left blue curved segment -->
  <ellipse cx="12" cy="15" rx="5.5" ry="6.5" fill="#4B9FFF"/>
  
  <!-- Bottom left blue rounded rectangle -->
  <rect x="9" y="20" width="14" height="6.5" rx="3.25" fill="#3B82F6"/>
  
  <!-- Right side black curved segment -->
  <ellipse cx="24" cy="19" rx="7" ry="8.5" fill="#1F1F1F" transform="rotate(-15 24 19)"/>
</svg>
