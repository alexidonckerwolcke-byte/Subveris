<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        width: 300px;
        padding: 15px;
        font-family: Arial, sans-serif;
        background: #f5f5f5;
      }
      h3 {
        margin: 0 0 10px 0;
        color: #333;
      }
      .status {
        padding: 10px;
        border-radius: 5px;
        margin: 10px 0;
        font-size: 13px;
      }
      .status.connected {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      .status.disconnected {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
      button {
        width: 100%;
        padding: 8px;
        margin-top: 10px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
      }
      button:hover {
        background: #0056b3;
      }
    </style>
  </head>
  <body>
    <h3>Subveris Tracker</h3>
    <div id="status" class="status disconnected">Not connected</div>
    <div id="tracking-status" class="status" style="margin-top: 10px; font-size: 12px;"></div>
    <div id="debug-info" style="margin-top: 12px; padding: 8px; background: #f0f0f0; border-radius: 4px; font-size: 11px; color: #555;"></div>
    <button id="open-settings">Settings</button>
    <script src="popup.js"></script>
  </body>
</html>
